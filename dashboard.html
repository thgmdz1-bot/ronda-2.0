<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard & Matriz de Operações - ITC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2.39.8/dist/umd/supabase.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --border-color: #475569;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-yellow: #f59e0b;
            --accent-red: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            /* Cores da Matriz */
            --grid-ok: #10b981;
            --grid-warn: #f59e0b;
            --grid-crit: #ef4444;
            --grid-empty: #334155;
        }

        body {
            background: var(--bg-main);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        .text-muted {
            color: var(--text-muted) !important;
        }

        .nav-tabs {
            border-bottom: 2px solid var(--border-color);
        }
        .nav-tabs .nav-link {
            color: var(--text-muted);
            border: none;
            font-weight: 600;
            padding: 10px 20px;
        }
        .nav-tabs .nav-link.active {
            background-color: transparent;
            color: var(--accent-blue) !important;
            border-bottom: 3px solid var(--accent-blue);
        }

        .card-stats {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 18px;
            position: relative;
            overflow: hidden;
            height: 100%;
        }
        .card-stats::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
        }
        .stats-total::before { background: var(--accent-blue); }
        .stats-ok::before { background: var(--accent-green); }
        .stats-warn::before { background: var(--accent-yellow); }
        .stats-crit::before { background: var(--accent-red); }
        .stats-kpi1::before { background: #8b5cf6; }
        .stats-kpi2::before { background: #ec4899; }

        .form-select {
            background: var(--bg-card) !important;
            color: var(--text-main) !important;
            border: 1px solid var(--border-color) !important;
            font-weight: 500;
        }

        .table-dark-custom {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
        }
        .table-dark-custom th {
            background: #0f172a;
            color: #f1f5f9;
            font-weight: 600;
            border-bottom: 2px solid var(--border-color);
            padding: 12px 16px;
        }
        .table-dark-custom td {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(71, 85, 105, 0.7);
            color: #f8fafc;
        }

        .badge-ok { background: rgba(16, 185, 129, 0.25); color: #34d399; border: 1px solid #10b981; font-weight: 600; }
        .badge-warn { background: rgba(245, 158, 11, 0.25); color: #fbbf24; border: 1px solid #f59e0b; font-weight: 600; }
        .badge-crit { background: rgba(239, 68, 68, 0.25); color: #f87171; border: 1px solid #ef4444; font-weight: 600; }

        /* Estrutura da Matriz */
        .table-grid {
            border-collapse: separate;
            border-spacing: 4px;
        }
        .table-grid th {
            background: #0f172a;
            color: #f1f5f9;
            text-align: center;
            font-size: 0.8rem;
            padding: 8px 4px;
            min-width: 36px;
            border-radius: 4px;
        }
        .table-grid td {
            text-align: center;
            padding: 8px 4px;
            font-size: 0.85rem;
            font-weight: bold;
            border-radius: 4px;
        }
        .item-row-title {
            text-align: left !important;
            min-width: 220px;
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff !important;
        }
        .status-cell { color: #ffffff !important; }
        .status-cell-ok { background-color: var(--grid-ok); }
        .status-cell-warn { background-color: var(--grid-warn); color: #000000 !important; }
        .status-cell-crit { background-color: var(--grid-crit); }
        .status-cell-empty { background-color: var(--grid-empty); color: var(--text-muted) !important; font-weight: normal; }

        .legenda-box {
            display: inline-block; width: 14px; height: 14px; border-radius: 3px; margin-right: 5px; vertical-align: middle;
        }
    </style>
</head>
<body class="p-4">

<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="mb-1 fw-bold text-white">📊 Central de Operações e Monitoramento</h3>
            <p class="text-muted small mb-0">Dados consolidados em tempo real integrados com o app ITC</p>
        </div>
        <div>
            <a href="index.html" class="btn btn-outline-light btn-sm me-2 fw-semibold">⬅️ Voltar ao App</a>
            <button class="btn btn-primary btn-sm fw-semibold" onclick="inicializarDashboard()">🔄 Forçar Recarga</button>
        </div>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <label class="small text-muted fw-bold d-block mb-1">Filtrar Localidade</label>
            <select id="filtroTorre" class="form-select form-select-sm" onchange="processarDadosFiltros()">
                <option value="Todos">Todos os Locais / Torres</option>
                <option value="Torre 1">Torre 1</option>
                <option value="Torre 2">Torre 2</option>
            </select>
        </div>
        <div class="col-md-3">
            <label class="small text-muted fw-bold d-block mb-1">Mês de Referência (Matriz)</label>
            <select id="filtroMes" class="form-select form-select-sm" onchange="processarDadosFiltros()">
                <option value="5" selected>Maio / 2026</option>
                <option value="6">Junho / 2026</option>
                <option value="7">Julho / 2026</option>
            </select>
        </div>
    </div>

    <ul class="nav nav-tabs mb-4" id="dashTabs" role="tablist">
        <li class="nav-item">
            <button class="nav-link active" id="visao-tab" data-bs-toggle="tab" data-bs-target="#tabVisao" type="button">📊 Visão Geral e Gráficos</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" id="matriz-tab" data-bs-toggle="tab" data-bs-target="#tabMatriz" type="button">📅 Matriz de Acompanhamento Diário</button>
        </li>
    </ul>

    <div class="tab-content" id="dashTabsContent">
        
        <div class="tab-pane fade show active" id="tabVisao" role="tabpanel">
            <div class="row g-3 mb-4">
                <div class="col-md-2">
                    <div class="card-stats stats-total">
                        <span class="text-muted small d-block uppercase fw-bold">Total Rondas</span>
                        <h2 class="fw-bold my-1 text-white" id="lblTotalRondas">0</h2>
                        <span class="text-muted small" id="lblTotalItens" style="color: #cbd5e1 !important;">0 itens</span>
                    </div>
                </div>
                <div class="col-md-2">
                    <div class="card-stats stats-ok">
                        <span class="text-muted small d-block uppercase fw-bold">Conformes (OK)</span>
                        <h2 class="fw-bold my-1 text-success" id="lblTotalOK">0</h2>
                        <span class="fw-semibold small text-success" id="lblPercOK">0% conf.</span>
                    </div>
                </div>
                <div class="col-md-2">
                    <div class="card-stats stats-warn">
                        <span class="text-muted small d-block uppercase fw-bold">Em Atenção</span>
                        <h2 class="fw-bold my-1 text-warning" id="lblTotalAviso">0</h2>
                        <span class="text-muted small">Monitoramento</span>
                    </div>
                </div>
                <div class="col-md-2">
                    <div class="card-stats stats-crit">
                        <span class="text-muted small d-block uppercase fw-bold">Com Problema</span>
                        <h2 class="fw-bold my-1 text-danger" id="lblTotalProblema">0</h2>
                        <span class="text-muted small">Pendências críticas</span>
                    </div>
                </div>
                <div class="col-md-2">
                    <div class="card-stats stats-kpi1">
                        <span class="text-muted small d-block uppercase fw-bold">Itens / Ronda</span>
                        <h2 class="fw-bold my-1" id="lblMediaItens" style="color: #a78bfa;">0.0</h2>
                        <span class="text-muted small">Média por checklist</span>
                    </div>
                </div>
                <div class="col-md-2">
                    <div class="card-stats stats-kpi2">
                        <span class="text-muted small d-block uppercase fw-bold">Taxa de Alerta</span>
                        <h2 class="fw-bold my-1" id="lbl
