<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ronda ITC</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2.39.8/dist/umd/supabase.js"></script>

    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --border-color: #475569;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
        }

        body {
            background: var(--bg-main);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            margin-bottom: 20px;
            color: #ffffff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
            transition: transform 0.2s, border-color 0.2s;
        }
        
        .card:hover {
            border-color: #64748b;
        }

        h1, h2, h3, h4, h5, h6, p, span, label {
            color: #ffffff !important;
        }

        .form-control, .form-select {
            background: var(--bg-input) !important;
            color: #ffffff !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 10px;
            padding: 10px 14px;
        }

        .form-control:focus, .form-select:focus {
            background: var(--bg-input) !important;
            color: #ffffff !important;
            border: 1px solid var(--accent-blue) !important;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3) !important;
        }

        .form-select option {
            background: var(--bg-card);
            color: #ffffff;
        }

        input::placeholder, textarea::placeholder {
            color: #94a3b8 !important;
            opacity: 1;
        }

        .btn-primary {
            background: var(--accent-blue);
            border: none;
            color: #ffffff;
            border-radius: 12px;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }

        .btn-success {
            background: var(--accent-green);
            border: none;
            color: #ffffff;
            border-radius: 12px;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .btn-success:hover {
            background: #059669;
        }

        .foto-preview {
            width: 100%;
            max-height: 180px;
            object-fit: cover;
            border-radius: 12px;
            margin-top: 12px;
            border: 2px dashed #64748b;
            padding: 4px;
            background: #0f172a;
        }

        textarea {
            resize: none;
        }

        .modal-content {
            background: var(--bg-card) !important;
            color: #ffffff !important;
            border: 1px solid var(--border-color);
            border-radius: 20px;
        }
        
        .app-header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center app-header">
        <div>
            <h2 class="mb-1" style="font-weight: 700; letter-spacing: -0.5px;">Ronda Diária ITC</h2>
            <span class="text-secondary fs-6 opacity-75">©️2026, Thiago Mendes™</span>
        </div>
        <button class="btn btn-success px-4 py-2" onclick="abrirHistorico()">
            📜 Histórico
        </button>
    </div>

    <div class="card p-4">
        <h5 class="mb-4 text-primary" style="font-weight: 600;">📋 Informações da Ronda</h5>
        <div class="row">
            <div class="col-md-4 mb-3">
                <label class="mb-2 text-secondary font-weight-bold">Torre</label>
                <select id="torre" class="form-select">
                    <option>Torre 1</option>
                    <option>Torre 2</option>
                </select>
            </div>

            <div class="col-md-4 mb-3">
                <label class="mb-2 text-secondary">Responsável</label>
                <input type="text" id="responsavel" class="form-control" placeholder="Digite o nome completo">
            </div>

            <div class="col-md-4 mb-3">
                <label class="mb-2 text-secondary">Data e Hora</label>
                <input type="text" id="data" class="form-control" readonly>
            </div>
        </div>
    </div>

    <h5 class="mb-3 text-secondary" style="font-weight: 600; padding-left: 5px;">🔍 Itens de Inspeção</h5>
    
    <div id="checklist"></div>

    <button class="btn btn-primary w-100 py-3 mt-4 fs-5" onclick="gerarPDF()">
        📄 Gerar Relatório Executivo (PDF)
    </button>

</div>

<div class="modal fade" id="historicoModal" tabindex="-1">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header border-secondary">
                <h5 class="modal-title">Histórico de Rondas</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="historicoLista"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
// ==========================================
// 1. DEFINIÇÃO DA DATA E ITENS DE INSPEÇÃO
// ==========================================
document.getElementById("data").value = new Date().toLocaleString('pt-BR');

const itens = [
    "Teste rápido elevador", "G2 Foyer", "Auditório 1", "Auditório 2", "Sala 1", "Sala 2",
    "Copa G2", "Elevador A", "Elevador B", "Elevador C", "Elevador D", "Elevador E",
    "Elevador SERVIÇO", "Elevador GARAGEM 1", "Elevador GARAGEM 2", "Heliponto", "Halls e WC",
    "Botoeira dos elevadores", "Portas de elevadores", "Janela Hall", "Iluminação recepção",
    "Funcionamento irrigação", "Portões térreo", "Catracas", "Câmeras", "Vidros fachada", "Refeitório"
];

const checklist = document.getElementById("checklist");

// Renderização estruturada de cada um dos cards na tela principal
itens.forEach((item, index)=>{
    checklist.innerHTML += `
    <div class="card p-4">
        <div class="d-flex align-items-center mb-3">
            <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center me-3" style="width: 32px; height: 32px; font-weight: bold; font-size: 14px;">
                ${index + 1}
            </div>
            <h5 class="mb-0" style="font-weight: 600;">${item}</h5>
        </div>

        <div class="row">
            <div class="col-md-3 mb-2">
                <label class="form-label text-secondary small">Status</label>
                <select class="form-select text-semibold" id="status_${index}">
                    <option value="OK">🟢 OK</option>
                    <option value="!! Atenção !!">🟡 !! Atenção !!</option>
                    <option value="XX Problema XX">🔴 XX Problema XX</option>
                </select>
            </div>

            <div class="col-md-5 mb-2">
                <label class="form-label text-secondary small">Observações</label>
                <textarea class="form-control" rows="2" id="obs_${index}" placeholder="Sem observações relevantes..."></textarea>
            </div>

            <div class="col-md-4 mb-2">
                <label class="form-label text-secondary small">Evidência Fotográfica</label>
                <input type="file" class="form-control" accept="image/*" id="foto_${index}" onchange="previewImagem(event, ${index})">
                <img id="preview_${index}" class="foto-preview" style="display:none;">
            </div>
        </div>
    </div>
    `;
});

// ==========================================
// 2. CONFIGURAÇÃO E CONEXÃO COM O SUPABASE
// ==========================================
const SUPABASE_URL = "https://orhudsajuoknkfcqhgah.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9yaHVkc2FqdW9rbmtmY3FoZ2FoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MjU0NTYsImV4cCI6MjA5NDIwMTQ1Nn0.85p-inG7Y2c_vf8tupyA4s3suv1Ba_s1GJ_2EDdP4YQ";

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ==========================================
// 3. FUNÇÕES UTILITÁRIAS E INTERAÇÕES
// ==========================================

// Mostra o preview local do arquivo selecionado
function previewImagem(event, index){
    const img = document.getElementById(`preview_${index}`);
    if(event.target.files && event.target.files[0]){
        img.src = URL.createObjectURL(event.target.files[0]);
        img.style.display = "block";
    }
}

// Converte o arquivo de imagem local para uma string Base64 utilizável pelo PDF de forma imediata
function converterParaBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });
}

// Geração de Relatório Executivo PDF com inserção de fotos locais
async function gerarPDF(){
    const botao = document.querySelector("button[onclick='gerarPDF()']");
    botao.disabled = true;
    botao.innerText = "⏳ Processando Relatório e Conectando ao Banco...";

    try {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        
        const pageHeight = doc.internal.pageSize.height; 
        const pageWidth = doc.internal.pageSize.width; 
        let y = 0;

        const torre = document.getElementById("torre").value;
        const responsavel = document.getElementById("responsavel").value || "Não informado";
        const data = document.getElementById("data").value;

        function desenharCabecalho(numeroPagina) {
            doc.setFillColor(15, 23, 42); 
            doc.rect(0, 0, pageWidth, 38, 'F');
            
            doc.setFillColor(37, 99, 235);
            doc.rect(0, 36, pageWidth, 2, 'F');

            doc.setTextColor(255, 255, 255);
            doc.setFont("Helvetica", "bold");
            doc.setFontSize(20);
            doc.text("RELATÓRIO DE RONDA DIÁRIA", 15, 16);
            
            doc.setFont("Helvetica", "normal");
            doc.setFontSize(11);
            doc.setTextColor(148, 163, 184);
            doc.text("ITC - International Trade Center", 15, 23);

            doc.setFillColor(30, 41, 59);
            doc.roundedRect(pageWidth - 85, 8, 70, 22, 3, 3, 'F');
            
            doc.setTextColor(255, 255, 255);
            doc.setFont("Helvetica", "bold");
            doc.setFontSize(9);
            doc.text(`DATA: ${data.split(',')[0]}`, pageWidth - 80, 14);
            doc.text(`TORRE: ${torre.toUpperCase()}`, pageWidth - 80, 20);
            doc.text(`PÁGINA: ${numeroPagina}`, pageWidth - 80, 26);
        }

        function desenharRodape() {
            doc.setFillColor(248, 250, 252);
            doc.rect(0, pageHeight - 15, pageWidth, 15, 'F');
            
            doc.setDrawColor(226, 232, 240);
            doc.line(0, pageHeight - 15, pageWidth, pageHeight - 15);
            
            doc.setFont("Helvetica", "normal");
            doc.setFontSize(8);
            doc.setTextColor(100, 116, 139);
            doc.text("© 2026 Thiago Mendes™ | Sistema de Gestão de Rondas ITC", 15, pageHeight - 6);
            doc.text("Confidencial e Documentado", pageWidth - 55, pageHeight - 6);
        }

        let paginaAtual = 1;
        desenharCabecalho(paginaAtual);

        y = 50;
        doc.setFillColor(241, 245, 249);
        doc.roundedRect(15, y, pageWidth - 30, 18, 2, 2, 'F');
        
        doc.setFont("Helvetica", "bold");
        doc.setFontSize(10);
        doc.setTextColor(15, 23, 42);
        doc.text("RESPONSÁVEL PELA RONDA:", 22, y + 11);
        
        doc.setFont("Helvetica", "normal");
        doc.setTextColor(37, 99, 235);
        doc.text(responsavel.toUpperCase(), 78, y + 11);
        
        y += 30;

        doc.setFillColor(30, 41, 59);
        doc.rect(15, y, pageWidth - 30, 9, 'F');
        
        doc.setFont("Helvetica", "bold");
        doc.setFontSize(10);
        doc.setTextColor(255, 255, 255);
        doc.text("ITEM DE INSPEÇÃO", 20, y + 6);
        doc.text("STATUS", pageWidth - 85, y + 6);
        doc.text("OBSERVAÇÕES / REGISTROS EVIDENCIAIS", pageWidth - 55, y + 6);
        
        y += 9;

        const dadosItensBanco = [];

        for(let index = 0; index < itens.length; index++){
            const item = itens[index];
            const status = document.getElementById(`status_${index}`).value;
            const obs = document.getElementById(`obs_${index}`).value.trim() || "Nenhuma observação registrada.";
            const inputFoto = document.getElementById(`foto_${index}`);
            
            let base64FotoLocal = null;
            let alturaBloco = 12; 

            // Se o usuário selecionou uma foto, processamos ela localmente para o PDF
            if (inputFoto.files.length > 0) {
                alturaBloco += 48; 
                base64FotoLocal = await converterParaBase64(inputFoto.files[0]);
            }

            dadosItensBanco.push({
                item_nome: item,
                status: status,
                observacao: obs
            });
            
            if(y + alturaBloco > pageHeight - 25){
                desenharRodape();
                doc.addPage();
                paginaAtual++;
                desenharCabecalho(paginaAtual);
                
                y = 50;
                doc.setFillColor(30, 41, 59);
                doc.rect(15, y, pageWidth - 30, 9, 'F');
                doc.setFont("Helvetica", "bold");
                doc.setFontSize(10);
                doc.setTextColor(255, 255, 255);
                doc.text("ITEM DE INSPEÇÃO", 20, y + 6);
                doc.text("STATUS", pageWidth - 85, y + 6);
                doc.text("OBSERVAÇÕES / REGISTROS EVIDENCIAIS", pageWidth - 55, y + 6);
                y += 9;
            }

            if (index % 2 === 0) {
                doc.setFillColor(248, 250, 252);
            } else {
                doc.setFillColor(255, 255, 255);
            }
            doc.rect(15, y, pageWidth - 30, alturaBloco, 'F');
            
            doc.setDrawColor(226, 232, 240);
            doc.setLineWidth(0.2);
            doc.line(15, y + alturaBloco, pageWidth - 15, y + alturaBloco);

            doc.setFont("Helvetica", "bold");
            doc.setFontSize(10);
            doc.setTextColor(15, 23, 42);
            doc.text(`${index + 1}. ${item}`, 20, y + 7);

            if (status.includes("OK")) {
                doc.setFillColor(16, 185, 129);
                doc.circle(pageWidth - 82, y + 5.5, 1.5, 'F');
                doc.setTextColor(16, 185, 129); 
                doc.text("OK", pageWidth - 78, y + 7);
            } else if (status.includes("Atenção")) {
                doc.setFillColor(217, 119, 6);
                doc.circle(pageWidth - 82, y + 5.5, 1.5, 'F');
                doc.setTextColor(217, 119, 6); 
                doc.text("ATENÇÃO", pageWidth - 78, y + 7);
            } else {
                doc.setFillColor(220, 38, 38);
                doc.circle(pageWidth - 82, y + 5.5, 1.5, 'F');
                doc.setTextColor(220, 38, 38); 
                doc.text("PROBLEMA", pageWidth - 78, y + 7);
            }

            let splitObs = doc.splitTextToSize(obs, 65);
            doc.text(splitObs, pageWidth - 55, y + 6);

            // Injeta a foto local diretamente na folha usando a string Base64
            if(base64FotoLocal){
                doc.setDrawColor(203, 213, 225);
                doc.setFillColor(255, 255, 255);
                doc.roundedRect(pageWidth - 55, y + 12, 55, 40, 1, 1, 'DF');
                
                try {
                    doc.addImage(base64FotoLocal, 'JPEG', pageWidth - 54, y + 13, 53, 38);
                } catch (e) {
                    doc.setFontSize(8);
                    doc.setTextColor(220, 38, 38);
                    doc.text("[Erro ao processar imagem]", pageWidth - 50, y + 25);
                }
            }

            y += alturaBloco;
        }

        desenharRodape();

        // Envia apenas o texto descritivo para as tabelas do Supabase
        await salvarNoSupabase(torre, responsavel, data, dadosItensBanco);

        const timestamp = new Date().toISOString().slice(0,10);
        doc.save(`Relatorio_Ronda_ITC_${torre.replace(" ", "_")}_${timestamp}.pdf`);

        alert("Dados da Ronda salvos na nuvem e PDF gerado com as fotos!");
    } catch (err) {
        console.error(err);
        alert("Ocorreu um erro ao salvar os logs textuais.");
    } finally {
        botao.disabled = false;
        botao.innerText = "📄 Gerar Relatório Executivo (PDF)";
    }
}

// Processa a inserção do texto (Sem colunas de imagem para não estourar o banco de dados)
async function salvarNoSupabase(torre, responsavel, dataRonda, itensInspecao) {
    const { data: rondaInserida, error: errorRonda } = await supabaseClient
        .from('rondas')
        .insert([{ torre, responsavel, data_ronda: dataRonda }])
        .select()
        .single();

    if (errorRonda) throw errorRonda;

    const linhasItens = itensInspecao.map(item => ({
        ronda_id: rondaInserida.id,
        item_nome: item.item_nome,
        status: item.status,
        observacao: item.observacao
    }));

    const { error: errorItens } = await supabaseClient
        .from('ronda_itens')
        .insert(linhasItens);

    if (errorItens) throw errorItens;
}

// Consulta em tempo real a tabela remota de auditorias
async function abrirHistorico(){
    document.getElementById("historicoLista").innerHTML = `<p class="text-white-50 p-3 text-center">Buscando dados no Supabase...</p>`;
    new bootstrap.Modal(document.getElementById("historicoModal")).show();

    const { data: historico, error } = await supabaseClient
        .from('rondas')
        .select('*')
        .order('id', { ascending: false })
        .limit(20);

    if (error) {
        document.getElementById("historicoLista").innerHTML = `<p class="text-danger p-3 text-center">Erro ao sincronizar histórico.</p>`;
        return;
    }

    let html = "";
    historico.forEach((item)=>{
        html += `
        <div class="card p-3 mb-3 border border-secondary">
            <h5 class="text-white mb-2" style="font-weight: 600;">🏢 ${item.torre}</h5>
            <p class="mb-1 text-white-50">🕵 Responsável: <span class="text-white font-weight-bold">${item.responsavel}</span></p>
            <p class="mb-0 text-white-50">📅 Data Emissão: <span class="text-white">${item.data_ronda}</span></p>
        </div>
        `;
    });

    if(html === ""){
        html = `<p class="text-white-50 p-3 text-center">Nenhuma ronda cadastrada no Supabase ainda.</p>`;
    }

    document.getElementById("historicoLista").innerHTML = html;
}
</script>

</body>
</html>
